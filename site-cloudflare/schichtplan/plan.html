<!DOCTYPE html>
<html lang="de" data-sp-theme="dark" data-sp-accent="teal">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="robots" content="noindex, nofollow">
  <title>SchichtPlan — Mein Plan</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/sp-style.css">
</head>
<body class="sp-body sp-plan-page" data-sp-page="plan">

  <header class="sp-topbar">
    <div class="sp-topbar-brand">SchichtPlan</div>
    <div class="sp-topbar-controls">
      <span class="sp-topbar-user" id="spTopbarUser"></span>
      <div class="sp-control-group">
        <span class="sp-control-label">Theme</span>
        <div class="sp-toggle-pill">
          <button type="button" class="sp-toggle-btn sp-is-active" data-sp-theme-btn="dark" aria-pressed="true">Dark</button>
          <button type="button" class="sp-toggle-btn" data-sp-theme-btn="light" aria-pressed="false">Light</button>
        </div>
      </div>
      <div class="sp-control-group">
        <span class="sp-control-label">Accent</span>
        <button type="button" class="sp-accent-dot sp-is-active" data-sp-accent-pick="teal" aria-label="Teal" title="Teal"></button>
        <button type="button" class="sp-accent-dot" data-sp-accent-pick="violet" aria-label="Violet" title="Violet"></button>
        <button type="button" class="sp-accent-dot" data-sp-accent-pick="navy" aria-label="Navy" title="Navy"></button>
      </div>
      <button type="button" class="sp-topbar-logout" id="spLogoutBtn" title="Abmelden">Abmelden</button>
    </div>
  </header>

  <div class="sp-app">
    <header class="sp-app-header">
      <div>
        <div class="sp-app-greeting" id="spGreeting">Guten Morgen,</div>
        <div class="sp-app-name" id="spEmployeeName">—</div>
      </div>
      <div class="sp-app-avatar" id="spAvatar" aria-hidden="true">—</div>
    </header>

    <nav class="sp-app-tabs" aria-label="Bereiche">
      <span class="sp-app-tab sp-is-active">📅 Plan</span>
      <a class="sp-app-tab" href="ferien.html">🏖️ Ferien</a>
      <span class="sp-app-tab sp-is-disabled">⏱️ Stunden</span>
      <span class="sp-app-tab sp-is-disabled">📄 Dokumente</span>
      <span class="sp-app-tab sp-is-disabled">👤 Profil</span>
    </nav>

    <div class="sp-plan-toolbar">
      <div>
        <div class="sp-plan-kw" id="spWeekLabel">KW 25 · Diese Woche</div>
        <div class="sp-plan-kw-sub" id="spWeekRange">15.–21.06.2026</div>
      </div>
      <div class="sp-plan-view-toggle" role="tablist" aria-label="Ansicht">
        <button type="button" class="sp-plan-view-btn sp-is-active" data-sp-plan-view="week" role="tab" aria-selected="true">Woche</button>
        <button type="button" class="sp-plan-view-btn" data-sp-plan-view="month" role="tab" aria-selected="false">Monat</button>
      </div>
    </div>

    <main class="sp-app-content">
      <p class="sp-demo-badge" id="spDemoBadge" hidden>Demo-Daten · API folgt später</p>

      <!-- Week view -->
      <section class="sp-plan-panel sp-is-visible" id="spPanelWeek" role="tabpanel">
        <div class="sp-notif" id="spNotif">
          <div class="sp-notif-icon" aria-hidden="true">🔔</div>
          <div class="sp-notif-body">
            <div class="sp-notif-title" id="spNotifTitle"></div>
            <div class="sp-notif-text" id="spNotifText"></div>
          </div>
          <span class="sp-notif-time" id="spNotifTime"></span>
        </div>

        <div class="sp-hero" id="spHero"></div>

        <div class="sp-card">
          <div class="sp-card-title" id="spWeekCardTitle">KW 25 · Diese Woche</div>
          <div class="sp-week-strip" id="spWeekStrip"></div>
        </div>

        <div class="sp-card">
          <div class="sp-card-title">Meine Schichten</div>
          <div id="spShiftList"></div>
        </div>
      </section>

      <!-- Month view -->
      <section class="sp-plan-panel" id="spPanelMonth" role="tabpanel" hidden>
        <div class="sp-card" id="spMonthCard"></div>
      </section>
    </main>
  </div>

  <nav class="sp-bottom-nav" aria-label="Navigation">
    <a class="sp-bottom-item sp-is-active" href="plan.html"><span class="sp-bottom-icon" aria-hidden="true">📅</span>Plan</a>
    <a class="sp-bottom-item" href="ferien.html"><span class="sp-bottom-icon" aria-hidden="true">🏖️</span>Ferien</a>
    <span class="sp-bottom-item"><span class="sp-bottom-icon" aria-hidden="true">⏱️</span>Stunden</span>
    <span class="sp-bottom-item"><span class="sp-bottom-icon" aria-hidden="true">📄</span>Docs</span>
    <span class="sp-bottom-item"><span class="sp-bottom-icon" aria-hidden="true">👤</span>Profil</span>
  </nav>

  <script src="assets/sp-app.js"></script>
</body>
</html>
