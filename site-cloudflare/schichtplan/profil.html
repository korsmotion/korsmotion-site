<!DOCTYPE html>
<html lang="de" data-sp-theme="dark" data-sp-accent="teal">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="robots" content="noindex, nofollow">
  <title>SchichtPlan — Profil</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/schichtplan/assets/sp-style.css">
</head>
<body class="sp-body sp-profil-page" data-sp-page="profil">

  <header class="sp-topbar">
    <div class="sp-topbar-brand">SchichtPlan</div>
    <div class="sp-topbar-controls">
      <span class="sp-topbar-user" id="spTopbarUser"></span>
      <div class="sp-control-group">
        <span class="sp-control-label">Theme</span>
        <div class="sp-toggle-pill">
          <button type="button" class="sp-toggle-btn sp-is-active" data-sp-theme-btn="dark" aria-pressed="true">Dark</button>
          <button type="button" class="sp-toggle-btn" data-sp-theme-btn="light" aria-pressed="false">Light</button>
        </div>
      </div>
      <div class="sp-control-group">
        <span class="sp-control-label">Accent</span>
        <button type="button" class="sp-accent-dot sp-is-active" data-sp-accent-pick="teal" aria-label="Teal" title="Teal"></button>
        <button type="button" class="sp-accent-dot" data-sp-accent-pick="violet" aria-label="Violet" title="Violet"></button>
        <button type="button" class="sp-accent-dot" data-sp-accent-pick="navy" aria-label="Navy" title="Navy"></button>
      </div>
      <button type="button" class="sp-topbar-logout" id="spLogoutBtn" title="Abmelden">Abmelden</button>
    </div>
  </header>

  <div class="sp-app">
    <header class="sp-app-header">
      <div>
        <div class="sp-app-greeting" id="spGreeting">Guten Morgen,</div>
        <div class="sp-app-name" id="spEmployeeName">—</div>
      </div>
      <div class="sp-app-avatar" id="spAvatar" aria-hidden="true">—</div>
    </header>

    <nav class="sp-app-tabs" aria-label="Bereiche">
      <a class="sp-app-tab" href="plan.html">📅 Plan</a>
      <a class="sp-app-tab" href="ferien.html">🏖️ Ferien</a>
      <a class="sp-app-tab" href="stunden.html">⏱️ Stunden</a>
      <a class="sp-app-tab" href="dokumente.html">📄 Dokumente</a>
      <span class="sp-app-tab sp-is-active">👤 Profil</span>
    </nav>

    <main class="sp-app-content sp-profil-content">
      <p class="sp-demo-badge" id="spDemoBadge" hidden>Demo-Daten · API folgt später</p>

      <div class="sp-prof-av" id="spProfAvatar">—</div>
      <div class="sp-prof-name" id="spProfName">—</div>
      <div class="sp-prof-id" id="spProfId">—</div>

      <div class="sp-card">
        <div class="sp-card-title">Sprache</div>
        <div class="sp-lang-sel" id="spLangSel"></div>
      </div>

      <div class="sp-card">
        <div class="sp-card-title">Benachrichtigungen</div>
        <div class="sp-notif-ch" id="spProfNotif"></div>
      </div>

      <div class="sp-card">
        <div class="sp-card-title">Info</div>
        <div id="spProfInfo"></div>
      </div>
    </main>
  </div>

  <nav class="sp-bottom-nav" aria-label="Navigation">
    <a class="sp-bottom-item" href="plan.html"><span class="sp-bottom-icon" aria-hidden="true">📅</span>Plan</a>
    <a class="sp-bottom-item" href="ferien.html"><span class="sp-bottom-icon" aria-hidden="true">🏖️</span>Ferien</a>
    <a class="sp-bottom-item" href="stunden.html"><span class="sp-bottom-icon" aria-hidden="true">⏱️</span>Stunden</a>
    <a class="sp-bottom-item" href="dokumente.html"><span class="sp-bottom-icon" aria-hidden="true">📄</span>Docs</a>
    <span class="sp-bottom-item sp-is-active"><span class="sp-bottom-icon" aria-hidden="true">👤</span>Profil</span>
  </nav>

  <div class="sp-toast" id="spToast" role="status" aria-live="polite"></div>

  <script src="/schichtplan/assets/sp-app.js"></script>
</body>
</html>
