<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>Lager 4.OG — Admin</title>
<link rel="stylesheet" href="/schichtplan/assets/kp-lager4og.css">
</head>
<body class="l4-body" id="l4AdminBody">
<header class="l4-topbar">
  <div class="l4-logo">
    <div class="l4-logo-icon">⚙️</div>
    <div><div class="l4-logo-text">Lager 4.OG</div><div class="l4-logo-sub">Verwaltung</div></div>
  </div>
</header>

<div class="l4-admin-wrap">
  <div class="l4-admin-tabs" role="tablist">
    <button type="button" class="l4-admin-tab on" data-l4-tab="parts">Teile</button>
    <button type="button" class="l4-admin-tab" data-l4-tab="employees">Mitarbeiter</button>
    <button type="button" class="l4-admin-tab" data-l4-tab="journal">Journal</button>
  </div>

  <div class="l4-admin-pane on" data-l4-pane="parts">
    <div class="l4-admin-toolbar">
      <div class="l4-admin-title">Ersatzteile <span id="l4PartsCount" style="font-size:13px;font-weight:400;color:var(--text-muted)"></span></div>
      <button type="button" class="btn-primary" id="l4NewPart" style="width:auto;height:38px;padding:0 18px;font-size:13px">＋ Neues Teil</button>
    </div>
    <input class="form-input" id="l4AdminPartSearch" type="search" placeholder="Suchen…" style="margin-bottom:12px">
    <div class="admin-list" id="l4PartsList"></div>
  </div>

  <div class="l4-admin-pane" data-l4-pane="employees" hidden>
    <div class="l4-admin-toolbar">
      <div class="l4-admin-title">Mitarbeiter</div>
      <button type="button" class="btn-primary" id="l4NewEmp" style="width:auto;height:38px;padding:0 18px;font-size:13px">＋ Neu</button>
    </div>
    <div class="admin-list" id="l4EmpList"></div>
  </div>

  <div class="l4-admin-pane" data-l4-pane="journal" hidden>
    <div class="l4-admin-toolbar">
      <div class="l4-admin-title">Entnahme-Journal</div>
      <button type="button" class="btn-secondary" id="l4ExportCsv">⬇️ CSV Export</button>
    </div>
    <div style="overflow-x:auto">
      <table class="l4-journal-table" id="l4JournalTable">
        <thead><tr>
          <th>Datum</th><th>Mitarbeiter</th><th>Teil</th><th>Dynawin</th><th>Menge</th><th>Maschine</th><th>Bestand</th>
        </tr></thead>
        <tbody id="l4JournalBody"></tbody>
      </table>
    </div>
  </div>
</div>

<!-- Part form -->
<div class="form-overlay" id="l4PartForm">
  <div class="form-sheet">
    <div class="form-header">
      <div class="form-title" id="l4PartFormTitle">Neues Teil</div>
      <button type="button" class="btn-secondary" id="l4PartFormClose" style="padding:6px 10px">✕</button>
    </div>
    <div class="form-body">
      <div class="form-row">
        <label class="form-label">Foto</label>
        <div class="l4-photo-row">
          <div class="photo-upload" id="l4PhotoUpload">
            <input type="file" accept="image/*" capture="environment" id="l4PhotoInput">
            <div>📷 Foto aufnehmen oder wählen</div>
          </div>
          <button type="button" class="btn-secondary l4-qr-upload-btn" id="l4QrUploadBtn">📷 QR zum Hochladen</button>
        </div>
        <div class="l4-qr-panel" id="l4QrPanel" hidden>
          <p class="l4-qr-hint">QR-Code mit dem Handy scannen — Foto erscheint automatisch hier.</p>
          <div class="l4-qr-canvas-wrap" id="l4QrCanvas"></div>
          <p class="l4-qr-status" id="l4QrStatus">Warte auf Foto vom Handy…</p>
        </div>
        <div id="l4PhotoPreview" hidden style="margin-top:8px">
          <img id="l4PhotoImg" alt="" style="max-width:100%;border-radius:8px;max-height:160px">
          <p class="l4-photo-received" id="l4PhotoReceived" hidden>✅ Foto erhalten!</p>
        </div>
      </div>
      <div class="form-row"><label class="form-label">Bezeichnung *</label><input class="form-input" id="l4FName"></div>
      <div class="form-row-2">
        <div><label class="form-label">Typ</label><input class="form-input" id="l4FType"></div>
        <div><label class="form-label">Kategorie *</label><select class="form-select" id="l4FCategory"><option value="">—</option></select></div>
      </div>
      <div class="form-row"><label class="form-label">Beschreibung</label><textarea class="form-textarea" id="l4FDesc"></textarea></div>
      <div class="form-row-2">
        <div><label class="form-label">Dynawin Nr.</label><input class="form-input" id="l4FNr"></div>
        <div><label class="form-label">Lagerort *</label><input class="form-input" id="l4FLoc"></div>
      </div>
      <div class="form-row-2">
        <div><label class="form-label">Best.-Nr.</label><input class="form-input" id="l4FBest"></div>
        <div><label class="form-label">Bestand</label><input class="form-input" id="l4FBestand" type="number" min="0"></div>
      </div>
      <div class="form-row"><label class="form-label">Min. Bestand (Warnung)</label><input class="form-input" id="l4FMin" type="number" min="0"></div>
      <div class="form-row"><label class="form-label">Maschinen</label><div class="machines-grid" id="l4FMachines"></div></div>
    </div>
    <div class="form-footer">
      <button type="button" class="btn-secondary" id="l4PartCancel">Abbrechen</button>
      <button type="button" class="btn-primary" id="l4PartSave" style="flex:1">Speichern</button>
    </div>
  </div>
</div>

<!-- Employee form -->
<div class="form-overlay" id="l4EmpForm">
  <div class="form-sheet">
    <div class="form-header">
      <div class="form-title" id="l4EmpFormTitle">Mitarbeiter</div>
      <button type="button" class="btn-secondary" id="l4EmpFormClose" style="padding:6px 10px">✕</button>
    </div>
    <div class="form-body">
      <div class="form-row"><label class="form-label">Name *</label><input class="form-input" id="l4EName"></div>
      <div class="form-row-2">
        <div><label class="form-label">Badge (4 Ziffern) *</label><input class="form-input" id="l4EBadge" maxlength="4" inputmode="numeric" pattern="[0-9]{4}"></div>
        <div><label class="form-label">Rolle</label><input class="form-input" id="l4ERole" placeholder="z.B. Mechaniker"></div>
      </div>
    </div>
    <div class="form-footer">
      <button type="button" class="btn-secondary" id="l4EmpCancel">Abbrechen</button>
      <button type="button" class="btn-primary" id="l4EmpSave" style="flex:1">Speichern</button>
    </div>
  </div>
</div>

<div class="toast" id="l4Toast"></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script src="/schichtplan/assets/kp-lager4og-common.js"></script>
<script src="/schichtplan/assets/kp-lager4og-admin.js"></script>
</body>
</html>
