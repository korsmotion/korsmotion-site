<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KorsPlan · Maschinen-Display</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Space+Grotesk:wght@600;700;800&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#F0EEF8;--s1:#FFFFFF;--s2:#F7F5FF;--s3:#EDE9FE;
  --bd:#D4CFF0;--bd2:#C4BDED;
  --pu:#7C3AED;--pl:#6D28D9;--pll:#EDE9FE;
  --tx:#1E1B2E;--mu:#6B7280;--mu2:#9CA3AF;
  --gn:#059669;--red:#DC2626;
}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--tx);font-family:'Inter',sans-serif;}
body{display:flex;flex-direction:column;}

/* ── TOPBAR ── */
.tb{
  height:48px;background:var(--s1);border-bottom:2px solid var(--bd);
  display:flex;align-items:center;padding:0 20px;gap:12px;flex-shrink:0;
  box-shadow:0 1px 4px rgba(0,0,0,.06);
}
.logo{font-family:'Space Grotesk',sans-serif;font-size:16px;font-weight:700;color:var(--tx);}
.logo em{color:var(--pu);font-style:normal;}
.div{width:1px;height:22px;background:var(--bd);}
.sel-label{font-size:11px;color:var(--mu);font-weight:500;}
.machine-btns{display:flex;gap:5px;}
.mbtn{
  padding:5px 14px;border-radius:8px;border:1.5px solid var(--bd);
  background:transparent;color:var(--mu);font-family:'Inter',sans-serif;
  font-size:12px;font-weight:600;cursor:pointer;transition:all .15s;
}
.mbtn:hover{border-color:var(--pu);color:var(--pu);background:var(--pll);}
.mbtn.active{background:var(--pu);border-color:var(--pu);color:#fff;}
.tb-right{margin-left:auto;display:flex;align-items:center;gap:12px;}
.clock-wrap{text-align:right;}
.clock{font-family:'Space Grotesk',sans-serif;font-size:20px;font-weight:700;color:var(--pu);line-height:1;}
.date-lbl{font-size:10px;color:var(--mu);margin-top:1px;}
.alert-btn{
  padding:5px 12px;border-radius:8px;border:1.5px solid #FCA5A5;
  background:transparent;color:#DC2626;font-family:'Inter',sans-serif;
  font-size:11px;font-weight:600;cursor:pointer;transition:all .15s;
}
.alert-btn:hover{background:#FEE2E2;}

/* ── MAIN ── */
.main{flex:1;padding:14px 20px 12px;display:flex;flex-direction:column;gap:10px;overflow:hidden;}

/* MACHINE HEADER */
.mach-header{
  background:var(--s1);border:1.5px solid var(--bd);border-radius:12px;
  padding:12px 18px;display:flex;align-items:center;gap:16px;flex-shrink:0;
  box-shadow:0 1px 4px rgba(0,0,0,.05);
}
.mach-name{font-family:'Space Grotesk',sans-serif;font-size:22px;font-weight:800;color:var(--tx);}
.mach-sub{font-size:11px;color:var(--mu);margin-top:2px;}
.mach-status{
  display:flex;align-items:center;gap:7px;
  background:#ECFDF5;border:1.5px solid #A7F3D0;
  color:var(--gn);padding:5px 12px;border-radius:99px;
  font-size:11px;font-weight:700;
}
.status-dot{width:7px;height:7px;border-radius:50%;background:var(--gn);animation:pulse 2s infinite;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.mach-kw{margin-left:auto;text-align:right;}
.mach-kw-label{font-size:10px;color:var(--mu);text-transform:uppercase;letter-spacing:.07em;font-weight:600;}
.mach-kw-val{font-size:13px;font-weight:700;color:var(--pu);}

/* ALERT */
.alert-banner{
  background:#FEF2F2;border:1.5px solid #FECACA;border-radius:10px;
  padding:9px 14px;display:flex;align-items:center;gap:10px;flex-shrink:0;
  animation:alertPulse 2s infinite;
}
.alert-banner.hidden{display:none;}
@keyframes alertPulse{0%,100%{border-color:#FECACA}50%{border-color:#DC2626}}
.alert-text{font-size:12px;font-weight:700;color:#991B1B;flex:1;}
.alert-time{font-size:11px;color:#DC2626;font-weight:500;}
.alert-close{background:#FEE2E2;border:none;color:#991B1B;padding:3px 8px;border-radius:6px;cursor:pointer;font-size:11px;font-weight:600;}

/* TIMELINE CARD */
.timeline-card{
  background:var(--s1);border:1.5px solid var(--bd);border-radius:12px;
  overflow:hidden;flex-shrink:0;
  box-shadow:0 1px 4px rgba(0,0,0,.05);
}

/* TIME RULER — single horizontal line */
.time-ruler{
  display:flex;border-bottom:1.5px solid var(--bd);background:var(--s2);
  overflow:hidden;
}
.ruler-cell{
  flex:1;padding:5px 3px;text-align:center;
  border-right:1px solid var(--bd);
  font-size:10px;font-weight:700;color:var(--mu2);
  white-space:nowrap;
}
.ruler-cell.major{color:var(--pu);border-right:1.5px solid var(--bd2);}
.ruler-cell:last-child{border-right:none;}

/* GANTT TRACK */
.gantt-track{
  position:relative;height:80px;
  display:flex;
}
.track-bg{position:absolute;inset:0;display:flex;pointer-events:none;}
.track-cell{flex:1;border-right:1px solid #F0EEF8;}
.track-cell.major{border-right:1.5px solid var(--bd);}
.track-cell:last-child{border-right:none;}

/* BLOCKS */
.blk{
  position:absolute;top:8px;bottom:8px;
  border-radius:8px;display:flex;flex-direction:column;
  justify-content:center;padding:0 10px;overflow:hidden;
  box-shadow:0 2px 8px rgba(0,0,0,.15);
  transition:filter .15s;cursor:default;
}
.blk:hover{filter:brightness(.93);}
.blk-name{font-size:12px;font-weight:800;line-height:1.2;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.blk-time{font-size:10px;font-weight:600;opacity:.8;margin-top:2px;white-space:nowrap;}
.blk-qty{font-size:9px;opacity:.65;white-space:nowrap;}

/* NOW LINE */
.now-line{
  position:absolute;top:0;bottom:0;width:2px;
  background:var(--pu);z-index:20;pointer-events:none;
}
.now-tag{
  position:absolute;top:4px;left:4px;
  background:var(--pu);color:#fff;
  font-size:9px;font-weight:800;padding:2px 6px;
  border-radius:4px;white-space:nowrap;
}

/* PROGRESS BAR */
.progress-wrap{
  padding:8px 14px;border-top:1px solid var(--bd);
  display:flex;align-items:center;gap:10px;background:var(--s2);
}
.prog-label{font-size:10px;font-weight:600;color:var(--mu);white-space:nowrap;}
.prog-bar-outer{flex:1;height:6px;background:var(--bd);border-radius:99px;overflow:hidden;}
.prog-bar-inner{height:100%;background:linear-gradient(90deg,var(--pu),var(--pl));border-radius:99px;transition:width .5s;}
.prog-pct{font-size:11px;font-weight:700;color:var(--pu);white-space:nowrap;}

/* EMPTY SPACE BELOW */
.info-row{
  display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;flex-shrink:0;
}
.info-card{
  background:var(--s1);border:1.5px solid var(--bd);border-radius:12px;
  padding:14px 16px;box-shadow:0 1px 4px rgba(0,0,0,.04);
}
.info-card-label{font-size:10px;font-weight:700;color:var(--mu);text-transform:uppercase;letter-spacing:.07em;margin-bottom:8px;}
.info-card-val{font-family:'Space Grotesk',sans-serif;font-size:22px;font-weight:800;color:var(--tx);}
.info-card-sub{font-size:11px;color:var(--mu);margin-top:2px;}

/* NEXT UP */
.next-wrap{
  background:var(--s1);border:1.5px solid var(--bd);border-radius:12px;
  padding:12px 16px;flex-shrink:0;
  box-shadow:0 1px 4px rgba(0,0,0,.04);
}
.next-label{font-size:10px;font-weight:700;color:var(--mu);text-transform:uppercase;letter-spacing:.07em;margin-bottom:8px;}
.next-blocks{display:flex;gap:8px;flex-wrap:wrap;}
.next-block{
  display:flex;align-items:center;gap:8px;
  background:var(--s2);border:1.5px solid var(--bd);border-radius:8px;
  padding:6px 12px;
}
.next-dot{width:10px;height:10px;border-radius:3px;flex-shrink:0;}
.next-name{font-size:12px;font-weight:600;color:var(--tx);}
.next-time{font-size:11px;color:var(--mu);margin-left:2px;}

/* BLOCK COLORS — bright solid */
.cq{background:#F59E0B;color:#1C1003;}
.cj{background:#2563EB;color:#fff;}
.cs{background:#DB2777;color:#fff;}
.cr{background:#7C3AED;color:#fff;}
.cra{background:#059669;color:#fff;}
.ck{background:#EA580C;color:#fff;}
.cc{background:#DC2626;color:#fff;}
.cp{background:#6B7280;color:#fff;}
.cv{background:#16A34A;color:#fff;}
.cy{background:#CA8A04;color:#fff;}
</style>
</head>
<body>

<div class="tb">
  <div class="logo"><em>Kors</em>Plan</div>
  <div class="div"></div>
  <span class="sel-label">Maschine:</span>
  <div class="machine-btns">
    <button class="mbtn active" onclick="show(0)">Waldner 10.3</button>
    <button class="mbtn" onclick="show(1)">Waldner 10.2</button>
    <button class="mbtn" onclick="show(2)">Schmidt 1kg</button>
  </div>
  <div class="tb-right">
    <button class="alert-btn" onclick="toggleAlert()">⚠ Alert testen</button>
    <div class="div"></div>
    <div class="clock-wrap">
      <div class="clock" id="clockEl">--:--:--</div>
      <div class="date-lbl" id="dateEl">--</div>
    </div>
  </div>
</div>

<div class="main" id="main"></div>

<script>
const HOURS = 24;
let alertOn = false;
let currentM = 0;

const MACHINES = [
  {
    name:'Waldner 10.3', sub:'Quark / RAS / Skyr · ungerade Woche',
    status:'10.3-2 ungerade W',
    blocks:[
      {n:'Sauerrahm',       s:0,  e:8,  c:'cr',  q:''},
      {n:'Jogurt LF "73/95"',s:8, e:18, c:'cj',  q:''},
      {n:'Pause',           s:18, e:19, c:'cp',  q:''},
      {n:'RAS Quark',       s:19, e:24, c:'cra', q:'3.5%'},
    ],
    stats:[
      {label:'Heutige Blöcke', val:'4', sub:'Produktionsaufträge'},
      {label:'Produktionszeit', val:'23h', sub:'von 24h geplant'},
      {label:'Nächste Reinigung', val:'18:00', sub:'Pause · 1h'},
    ]
  },
  {
    name:'Waldner 10.2', sub:'Rahm · Kefir · LF Jogurt',
    status:'Waldner 19.2',
    blocks:[
      {n:'Rahm',            s:0,  e:3,  c:'cr',  q:''},
      {n:'Kefir Coop 180g', s:3,  e:14, c:'ck',  q:'~4200 St'},
      {n:'Reinigung (R)',   s:14, e:15, c:'cc',  q:'Maschinenwäsche'},
      {n:'LF Jog CNP',      s:15, e:22, c:'cj',  q:''},
      {n:'Pause',           s:22, e:24, c:'cp',  q:''},
    ],
    stats:[
      {label:'Heutige Blöcke', val:'5', sub:'Produktionsaufträge'},
      {label:'Produktionszeit', val:'22h', sub:'von 24h geplant'},
      {label:'Nächste Reinigung', val:'14:00', sub:'Reinigung · 1h'},
    ]
  },
  {
    name:'Schmidt 1kg', sub:'Quark · CO NP · Bemasor Klär',
    status:'Bemasor Klär',
    blocks:[
      {n:'7000 kg CO NP',   s:0,  e:8,  c:'cq',  q:'6x1kg Tr'},
      {n:'Reinigung (R)',   s:8,  e:9,  c:'cc',  q:'Maschinenwäsche'},
      {n:'4620 kg Kalko',   s:9,  e:18, c:'cq',  q:'5x500g Tr'},
      {n:'Pause',           s:18, e:19, c:'cp',  q:''},
      {n:'Quark 1 KG',      s:19, e:24, c:'cq',  q:'Nachtschicht'},
    ],
    stats:[
      {label:'Heutige Blöcke', val:'5', sub:'Produktionsaufträge'},
      {label:'Menge gesamt', val:'11620 kg', sub:'Tagesproduktion'},
      {label:'Nächste Reinigung', val:'08:00', sub:'Reinigung · 1h'},
    ]
  },
];

function fmtH(h){ return String(Math.floor(h)).padStart(2,'0')+':'+String(Math.round((h%1)*60)).padStart(2,'0'); }

function show(idx){
  currentM = idx;
  document.querySelectorAll('.mbtn').forEach((b,i)=>b.classList.toggle('active',i===idx));
  render();
}

function toggleAlert(){ alertOn=!alertOn; render(); }

function render(){
  const m = MACHINES[currentM];
  const now = new Date();
  const nowH = now.getHours() + now.getMinutes()/60;
  const nowPct = (nowH/HOURS)*100;

  const curBlk = m.blocks.find(b=>nowH>=b.s&&nowH<b.e);
  const nextBlks = m.blocks.filter(b=>b.s>nowH).slice(0,4);
  const prog = curBlk ? Math.round(((nowH-curBlk.s)/(curBlk.e-curBlk.s))*100) : 0;

  // ruler
  const rulerHTML = Array.from({length:HOURS},(_,h)=>
    `<div class="ruler-cell ${h%6===0&&h>0?'major':''}">${String(h).padStart(2,'0')}</div>`
  ).join('');

  // grid
  const gridHTML = Array.from({length:HOURS},(_,h)=>
    `<div class="track-cell ${h%6===0&&h>0?'major':''}"></div>`
  ).join('');

  // blocks
  const blocksHTML = m.blocks.map(b=>{
    const left=(b.s/HOURS)*100;
    const width=Math.max(((b.e-b.s)/HOURS)*100,.5);
    const isCur = nowH>=b.s&&nowH<b.e;
    return `<div class="blk ${b.c}" style="left:${left}%;width:calc(${width}% - 2px)">
      <div class="blk-name">${b.n}</div>
      <div class="blk-time">${fmtH(b.s)} – ${fmtH(b.e)} · ${b.e-b.s}h</div>
      ${b.q?`<div class="blk-qty">${b.q}</div>`:''}
    </div>`;
  }).join('');

  // status
  const statusHTML = curBlk
    ? `<div class="mach-status"><span class="status-dot"></span>Aktiv: ${curBlk.n}</div>`
    : `<div class="mach-status" style="background:#F9FAFB;border-color:#E5E7EB;color:#6B7280;"><span class="status-dot" style="background:#9CA3AF"></span>Kein aktiver Block</div>`;

  // alert
  const alertHTML = alertOn ? `
    <div class="alert-banner">
      <span style="font-size:16px">🔴</span>
      <div class="alert-text">PLANÄNDERUNG · ${curBlk?curBlk.n:'Block'} endet früher — nächster Block verschiebt sich!</div>
      <div class="alert-time">${now.toLocaleTimeString('de-CH',{hour:'2-digit',minute:'2-digit'})} Uhr</div>
      <button class="alert-close" onclick="alertOn=false;render()">✕</button>
    </div>` : '';

  // stats
  const statsHTML = m.stats.map(s=>`
    <div class="info-card">
      <div class="info-card-label">${s.label}</div>
      <div class="info-card-val">${s.val}</div>
      <div class="info-card-sub">${s.sub}</div>
    </div>`).join('');

  // next
  const nextHTML = nextBlks.length
    ? nextBlks.map(b=>`<div class="next-block">
        <div class="next-dot ${b.c}"></div>
        <span class="next-name">${b.n}</span>
        <span class="next-time">${fmtH(b.s)} – ${fmtH(b.e)}</span>
      </div>`).join('')
    : `<span style="font-size:12px;color:var(--mu)">Keine weiteren Blöcke heute</span>`;

  document.getElementById('main').innerHTML = `
    <div class="mach-header">
      <div>
        <div class="mach-name">${m.name}</div>
        <div class="mach-sub">${m.sub}</div>
      </div>
      ${statusHTML}
      <div class="mach-kw">
        <div class="mach-kw-label">KW 25 · Montag</div>
        <div class="mach-kw-val">16.06.2026</div>
      </div>
    </div>

    ${alertHTML}

    <div class="timeline-card">
      <div class="time-ruler">${rulerHTML}</div>
      <div class="gantt-track">
        <div class="track-bg">${gridHTML}</div>
        <div class="now-line" style="left:${nowPct}%">
          <div class="now-tag">▶ ${fmtH(nowH)}</div>
        </div>
        ${blocksHTML}
      </div>
      ${curBlk ? `
      <div class="progress-wrap">
        <div class="prog-label">Fortschritt: ${curBlk.n}</div>
        <div class="prog-bar-outer"><div class="prog-bar-inner" style="width:${prog}%"></div></div>
        <div class="prog-pct">${prog}%</div>
      </div>` : ''}
    </div>

    <div class="info-row">${statsHTML}</div>

    <div class="next-wrap">
      <div class="next-label">Nächste Blöcke</div>
      <div class="next-blocks">${nextHTML}</div>
    </div>
  `;
}

function tick(){
  const now = new Date();
  document.getElementById('clockEl').textContent =
    now.toLocaleTimeString('de-CH',{hour:'2-digit',minute:'2-digit',second:'2-digit'});
  document.getElementById('dateEl').textContent =
    now.toLocaleDateString('de-DE',{weekday:'long',day:'2-digit',month:'2-digit',year:'numeric'});
}

render(); tick();
setInterval(tick, 1000);
setInterval(render, 30000);
</script>
</body>
</html>
