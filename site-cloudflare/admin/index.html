<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kors Motion — Admin</title>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #E8E4F4;
  --bg-card: #FFFFFF;
  --bg-input: #F0EDF9;
  --accent: #7C3AED;
  --accent-hover: #6D28D9;
  --accent-dim: rgba(124,58,237,.1);
  --text: #1A1040;
  --text-muted: #6B6890;
  --border: #CEC8E8;
  --danger: #DC2626;
  --danger-bg: #FEF2F2;
  --danger-border: #FECACA;
  --success: #16A34A;
  --warning: #D97706;
  --shadow-card: 0 2px 12px rgba(124,58,237,.1);
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Manrope',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;line-height:1.5}

/* Login */
.login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;
  background:linear-gradient(135deg,#F0EBFF 0%,#E8DFFB 50%,#D9C5F5 100%)}
.login-card{background:var(--bg-card);border:1px solid var(--border);border-radius:20px;padding:40px 36px;
  width:100%;max-width:380px;box-shadow:0 8px 40px rgba(124,58,237,.12)}
.login-logo{text-align:center;margin-bottom:28px}
.login-logo h1{font-size:22px;font-weight:700}
.login-logo p{font-size:13px;color:var(--text-muted);margin-top:4px}
.login-error{color:var(--danger);font-size:13px;margin-top:10px;display:none}
.login-error.show{display:block}

/* Layout */
.app{max-width:1000px;margin:0 auto;padding:28px 24px 100px}
.header{display:flex;align-items:center;justify-content:space-between;margin-bottom:24px;flex-wrap:wrap;gap:12px}
.header-left{display:flex;align-items:center;gap:16px}
.header-logo{display:flex;align-items:center;gap:10px}
.header-logo h1{font-size:20px;font-weight:700}
.header-tag{font-size:11px;font-weight:600;background:var(--accent-dim);color:var(--accent);
  padding:3px 10px;border-radius:100px;text-transform:uppercase;letter-spacing:.05em}
.header-actions{display:flex;gap:8px;align-items:center}

/* Admin lang switcher */
.admin-lang-switcher{display:flex;gap:4px;background:var(--bg-input);border:2px solid var(--border);
  border-radius:9px;padding:3px}
.admin-lang-btn{padding:5px 12px;border-radius:6px;font-family:inherit;font-size:12px;font-weight:700;
  border:none;cursor:pointer;background:transparent;color:var(--text-muted);transition:all .15s}
.admin-lang-btn.active{background:var(--accent);color:#fff}
.admin-lang-btn:hover:not(.active){background:var(--accent-dim);color:var(--accent)}

/* Forms */
.form-group{margin-bottom:12px}
.form-label{display:block;font-size:11px;font-weight:700;color:var(--text-muted);margin-bottom:5px;
  text-transform:uppercase;letter-spacing:.06em}
.form-input,.form-textarea{width:100%;background:var(--bg-input);border:2px solid var(--border);
  border-radius:10px;padding:10px 13px;font-family:inherit;font-size:14px;color:var(--text);
  outline:none;transition:border-color .2s,box-shadow .2s}
.form-input:focus,.form-textarea:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-dim);background:#fff}
.form-textarea{resize:vertical;min-height:68px}

/* Buttons */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:7px;padding:10px 18px;
  border-radius:9px;font-family:inherit;font-size:13px;font-weight:600;border:none;cursor:pointer;transition:all .15s}
.btn-primary{background:var(--accent);color:#fff}
.btn-primary:hover{background:var(--accent-hover)}
.btn-ghost{background:#fff;color:var(--text-muted);border:2px solid var(--border)}
.btn-ghost:hover{color:var(--text);border-color:var(--accent);background:var(--accent-dim)}
.btn-danger{background:var(--danger-bg);color:var(--danger);border:2px solid var(--danger-border)}
.btn-danger:hover{background:#FEE2E2}
.btn-sm{padding:7px 13px;font-size:12px;border-radius:7px}

/* Section */
.section{background:var(--bg-card);border:1px solid var(--border);border-radius:16px;
  padding:20px 24px;margin-bottom:16px;box-shadow:var(--shadow-card)}
.section-head{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;margin-bottom:16px}
.section-title{font-size:15px;font-weight:700}
.section-count{font-size:12px;font-weight:700;color:var(--accent);background:var(--accent-dim);
  padding:3px 10px;border-radius:100px;min-width:24px;text-align:center}

/* Toggle */
.toggle-row{display:flex;align-items:center;justify-content:space-between;gap:16px}
.toggle-label{font-size:14px;font-weight:600}
.toggle-desc{font-size:12px;color:var(--text-muted);margin-top:2px}
.toggle{position:relative;width:46px;height:25px;flex-shrink:0}
.toggle input{opacity:0;width:0;height:0}
.toggle-slider{position:absolute;inset:0;background:#E4E0F0;border-radius:100px;cursor:pointer;transition:background .2s}
.toggle-slider::before{content:'';position:absolute;width:19px;height:19px;left:3px;top:3px;
  background:#fff;border-radius:50%;transition:transform .2s;box-shadow:0 1px 4px rgba(0,0,0,.15)}
.toggle input:checked+.toggle-slider{background:var(--accent)}
.toggle input:checked+.toggle-slider::before{transform:translateX(21px)}

/* Category sections */
.cat-section{border:2px solid var(--border);border-radius:14px;overflow:hidden;margin-bottom:12px}
.cat-header{display:flex;align-items:center;justify-content:space-between;padding:13px 18px;
  background:#fff;cursor:pointer;user-select:none;transition:background .15s}
.cat-header:hover{background:var(--bg-input)}
.cat-header-left{display:flex;align-items:center;gap:10px}
.cat-icon{font-size:18px}
.cat-label{font-size:14px;font-weight:700}
.cat-count{font-size:11px;color:var(--text-muted);background:var(--bg-input);
  padding:2px 9px;border-radius:100px;border:2px solid var(--border)}
.cat-header-right{display:flex;align-items:center;gap:10px}
.cat-chevron{font-size:18px;color:var(--text-muted);transition:transform .2s;display:inline-block}
.cat-chevron.open{transform:rotate(180deg)}
.cat-body{display:none;padding:12px 14px;background:var(--bg-input);border-top:2px solid var(--border)}
.cat-body.open{display:block}

/* Item card */
.item-card{background:#fff;border:2px solid var(--border);border-radius:12px;padding:16px;
  margin-bottom:10px;transition:opacity .2s,border-color .2s}
.item-card:hover{border-color:rgba(124,58,237,.3)}
.item-card.hidden-item{opacity:.55}
.item-card-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;gap:10px}
.item-card-title{font-size:14px;font-weight:600;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.item-card-actions{display:flex;gap:6px;flex-shrink:0}
.item-card-body{display:grid;grid-template-columns:120px 1fr;gap:16px;align-items:start}
.item-fields{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.item-fields .full{grid-column:1/-1}
.fields-col{display:flex;flex-direction:column;gap:12px}

/* Thumbnail */
.thumb-col{display:flex;flex-direction:column;gap:8px}
.thumb-preview{width:120px;height:90px;object-fit:cover;border-radius:10px;border:2px solid var(--border)}
.thumb-placeholder{width:120px;height:90px;border-radius:10px;border:2px dashed var(--border);
  background:var(--bg-input);display:flex;align-items:center;justify-content:center;
  font-size:11px;color:var(--text-muted);font-weight:500;text-align:center}

/* Lang tabs */
.lang-section{background:var(--bg-input);border:2px solid var(--border);border-radius:12px;padding:14px}
.lang-section-label{font-size:11px;font-weight:700;color:var(--text-muted);text-transform:uppercase;
  letter-spacing:.06em;margin-bottom:10px}
.lang-tabs{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:12px}
.lang-tab{padding:5px 12px;border-radius:7px;font-family:inherit;font-size:12px;font-weight:700;
  border:2px solid var(--border);cursor:pointer;background:#fff;color:var(--text-muted);transition:all .15s}
.lang-tab.active{background:var(--accent);color:#fff;border-color:var(--accent)}
.lang-tab:hover:not(.active){border-color:var(--accent);color:var(--accent)}
.lang-fields{display:flex;flex-direction:column;gap:10px}

/* Save bar */
.save-bar{position:fixed;bottom:0;left:0;right:0;background:rgba(255,255,255,.94);
  backdrop-filter:blur(16px);border-top:2px solid var(--border);padding:14px 24px;
  z-index:100;display:flex;align-items:center;justify-content:center;gap:16px;
  box-shadow:0 -4px 20px rgba(0,0,0,.06)}
.save-status{font-size:13px;color:var(--text-muted)}
.save-status.success{color:var(--success)}
.save-status.error{color:var(--danger)}
.save-status.warning{color:var(--warning)}

/* Toast */
.toast{position:fixed;top:24px;right:24px;background:#fff;border:2px solid var(--border);
  border-radius:12px;padding:13px 20px;font-size:13px;font-weight:500;z-index:200;
  transform:translateX(120%);transition:transform .3s;box-shadow:0 4px 20px rgba(0,0,0,.1)}
.toast.show{transform:translateX(0)}
.toast.success{border-color:rgba(22,163,74,.4);color:var(--success)}
.toast.error{border-color:rgba(220,38,38,.4);color:var(--danger)}

.empty-state{text-align:center;padding:24px;color:var(--text-muted);font-size:13px}

@media(max-width:640px){
  .item-card-body{grid-template-columns:1fr}
  .item-fields{grid-template-columns:1fr}
  .header{flex-direction:column;align-items:flex-start}
}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="loginScreen" class="login-wrap">
  <div class="login-card">
    <div class="login-logo">
      <h1>Kors Motion</h1>
      <p>Admin Panel</p>
    </div>
    <form id="loginForm">
      <div class="form-group">
        <label class="form-label" for="password" data-ui="password">Password</label>
        <input type="password" id="password" class="form-input" placeholder="Enter password" autocomplete="current-password" required>
      </div>
      <button type="submit" class="btn btn-primary" style="width:100%" data-ui="signIn">Sign in</button>
      <p class="login-error" id="loginError" data-ui="wrongPassword">Incorrect password</p>
    </form>
  </div>
</div>

<!-- ADMIN -->
<div id="adminApp" class="app" style="display:none">
  <div class="header">
    <div class="header-left">
      <div class="header-logo">
        <h1 data-ui="adminTitle">Admin Panel</h1>
        <span class="header-tag">Kors Motion</span>
      </div>
      <!-- Admin UI language switcher -->
      <div class="admin-lang-switcher">
        <button class="admin-lang-btn" data-lang="ru">RU</button>
        <button class="admin-lang-btn" data-lang="de">DE</button>
        <button class="admin-lang-btn active" data-lang="en">EN</button>
      </div>
    </div>
    <div class="header-actions">
      <a href="../index.html" class="btn btn-ghost btn-sm" target="_blank" data-ui="viewSite">View site ↗</a>
      <button class="btn btn-ghost btn-sm" id="logoutBtn" data-ui="logout">Logout</button>
    </div>
  </div>

  <!-- Settings -->
  <div class="section">
    <div class="toggle-row">
      <div>
        <div class="toggle-label" data-ui="showDev">Show Development section</div>
        <div class="toggle-desc" data-ui="showDevDesc">Shows Dev Apps link in navigation</div>
      </div>
      <label class="toggle">
        <input type="checkbox" id="showDevSection">
        <span class="toggle-slider"></span>
      </label>
    </div>
  </div>

  <!-- Portfolio -->
  <div class="section">
    <div class="section-head">
      <div class="section-title" data-ui="portfolio">Portfolio</div>
      <span class="section-count" id="projectsCount">0</span>
    </div>
    <div id="projectsList"></div>
  </div>

  <!-- Dev Apps -->
  <div class="section">
    <div class="section-head">
      <div class="section-title" data-ui="devApps">Dev Apps</div>
      <div style="display:flex;gap:8px;align-items:center">
        <span class="section-count" id="appsCount">0</span>
        <button class="btn btn-primary btn-sm" id="addAppBtn" data-ui="add">+ Add</button>
      </div>
    </div>
    <div id="appsList"></div>
  </div>
</div>

<!-- SAVE BAR -->
<div class="save-bar" id="saveBar" style="display:none">
  <span class="save-status" id="saveStatus"></span>
  <button class="btn btn-primary" id="saveBtn" data-ui="saveChanges">Save changes</button>
</div>

<div class="toast" id="toast"></div>
<script src="admin.js"></script>
</body>
</html>
