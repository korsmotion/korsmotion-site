<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AGB — Kors Motion</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;1,400&family=Manrope:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--violet-deep:#5B3FBF;--violet-mid:#8B6FE8;--violet-soft:#C9B8F5;--violet-mist:#E8DFFB;--ink:#1A1530;--ink-soft:#4A4566;--ink-mute:#8A85A6}
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{font-family:'Manrope',sans-serif;color:var(--ink);background:linear-gradient(180deg,#FFFFFF 0%,#F8F3FF 20%,#EDE2FB 45%,#D9C5F5 70%,#B89AED 100%);background-attachment:fixed;min-height:100vh;overflow-x:hidden;line-height:1.6}
body.modal-open{overflow:hidden}
.orb{position:fixed;border-radius:50%;filter:blur(80px);opacity:.5;pointer-events:none;z-index:0}
.orb-1{width:500px;height:500px;background:radial-gradient(circle,#B89AED,transparent 70%);top:-100px;right:-100px;animation:float 20s ease-in-out infinite}
.orb-2{width:400px;height:400px;background:radial-gradient(circle,#8B6FE8,transparent 70%);bottom:20%;left:-150px;animation:float 25s ease-in-out infinite reverse}
.orb-3{width:350px;height:350px;background:radial-gradient(circle,#C9B8F5,transparent 70%);top:50%;right:10%;animation:float 30s ease-in-out infinite}
@keyframes float{0%,100%{transform:translate(0,0) scale(1)}33%{transform:translate(30px,-50px) scale(1.05)}66%{transform:translate(-20px,30px) scale(.95)}}
nav{position:fixed;top:24px;left:50%;transform:translateX(-50%);z-index:100;background:rgba(255,255,255,.6);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,.8);border-radius:100px;padding:10px 12px 10px 28px;display:flex;align-items:center;gap:32px;box-shadow:0 8px 32px rgba(91,63,191,.08)}
.nav-logo{display:flex;align-items:center;gap:10px;text-decoration:none}
.nav-logo img{width:36px;height:36px;object-fit:contain}
.nav-logo-text{font-family:'Playfair Display',serif;font-weight:500;font-size:17px;color:var(--ink)}
nav ul{display:flex;gap:28px;list-style:none}
nav a.nav-link{font-weight:500;font-size:14px;color:var(--ink-soft);text-decoration:none;transition:color .3s}
nav a.nav-link:hover{color:var(--violet-deep)}
.lang-switcher{position:relative}
.lang-button{background:rgba(255,255,255,.5);border:1px solid rgba(184,154,237,.3);border-radius:100px;padding:8px 14px;font-family:'Manrope',sans-serif;font-size:13px;font-weight:600;color:var(--ink);cursor:pointer;display:flex;align-items:center;gap:6px;transition:all .3s;border:none}
.lang-button:hover{background:rgba(255,255,255,.8)}
.lang-button svg{transition:transform .3s}
.lang-switcher.open .lang-button svg{transform:rotate(180deg)}
.lang-dropdown{position:absolute;top:calc(100% + 8px);right:0;background:rgba(255,255,255,.95);backdrop-filter:blur(20px);border:1px solid rgba(184,154,237,.3);border-radius:16px;padding:8px;min-width:140px;box-shadow:0 12px 32px rgba(91,63,191,.15);opacity:0;visibility:hidden;transform:translateY(-8px);transition:all .3s}
.lang-switcher.open .lang-dropdown{opacity:1;visibility:visible;transform:translateY(0)}
.lang-option{width:100%;background:none;border:none;padding:10px 14px;text-align:left;border-radius:10px;font-family:'Manrope',sans-serif;font-size:14px;color:var(--ink);cursor:pointer;display:flex;align-items:center;gap:10px;transition:background .2s}
.lang-option:hover{background:var(--violet-mist)}
.lang-option.active{background:var(--violet-mist);color:var(--violet-deep);font-weight:600}
.lang-flag{width:22px;height:16px;border-radius:3px;flex-shrink:0;display:inline-block;border:1px solid rgba(0,0,0,.1);overflow:hidden}
.flag-ru{background:linear-gradient(180deg,#fff 0%,#fff 33.3%,#0039A6 33.3%,#0039A6 66.6%,#D52B1E 66.6%,#D52B1E 100%)}
.flag-de{background:linear-gradient(180deg,#000 0%,#000 33.3%,#DD0000 33.3%,#DD0000 66.6%,#FFCE00 66.6%,#FFCE00 100%)}
.flag-en{background:#012169}
.flag-it{background:linear-gradient(90deg,#009246 0%,#009246 33.3%,#fff 33.3%,#fff 66.6%,#CE2B37 66.6%,#CE2B37 100%)}
.flag-fr{background:linear-gradient(90deg,#0055A4 0%,#0055A4 33.3%,#fff 33.3%,#fff 66.6%,#EF4135 66.6%,#EF4135 100%)}
.flag-es{background:linear-gradient(180deg,#AA151B 0%,#AA151B 25%,#F1BF00 25%,#F1BF00 75%,#AA151B 75%,#AA151B 100%)}
.nav-cta{background:var(--ink);color:white !important;padding:10px 20px;border-radius:100px;transition:all .3s;font-weight:500;font-size:14px;text-decoration:none;border:none;cursor:pointer;display:inline-flex;align-items:center}
.nav-cta:hover{background:var(--violet-deep);transform:translateY(-1px)}
.nav-hamburger{display:none;flex-direction:column;justify-content:center;gap:5px;width:28px;height:28px;background:none;border:none;cursor:pointer;padding:0;flex-shrink:0;z-index:1000;position:relative}
.nav-hamburger span{display:block;width:28px;height:2px;background:var(--ink);border-radius:2px;transition:transform .3s ease,opacity .3s ease}
.nav-hamburger.open span:nth-child(1){transform:translateY(7px) rotate(45deg)}
.nav-hamburger.open span:nth-child(2){opacity:0}
.nav-hamburger.open span:nth-child(3){transform:translateY(-7px) rotate(-45deg)}
.nav-links-wrap{display:contents}
.nav-cta-mobile{display:none}
.nav-backdrop{display:none}
@media (max-width:768px){
  nav{flex-wrap:nowrap;border-radius:16px;padding:10px 16px;width:calc(100% - 32px);gap:12px}
  nav>.nav-cta{display:none}
  .nav-hamburger{display:flex;margin-left:auto}
  .nav-backdrop{display:block;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:998;opacity:0;visibility:hidden;transition:opacity .3s ease,visibility .3s ease;pointer-events:none}
  .nav-backdrop.open{opacity:1;visibility:visible;pointer-events:auto}
  .nav-links-wrap{display:flex;flex-direction:column;position:fixed;inset:0;z-index:999;background:#fff;transform:translateX(100%);transition:transform .3s ease;pointer-events:none;padding:100px 32px 40px}
  nav.menu-open .nav-links-wrap{transform:translateX(0);pointer-events:auto}
  .nav-links-wrap ul{flex:1;display:flex;flex-direction:column;justify-content:center;align-items:center;gap:4px;width:100%;list-style:none}
  .nav-links-wrap li{width:100%;text-align:center}
  .nav-links-wrap .nav-link{display:block;padding:16px 24px;width:100%;font-size:20px;font-weight:600;color:var(--ink)}
  .nav-cta-mobile{display:inline-flex;justify-content:center;width:100%;padding:16px 28px;font-size:16px;margin-top:auto;flex-shrink:0}
}
.container{max-width:1280px;margin:0 auto;padding:0 32px;position:relative;z-index:1}
.legal-page{padding:140px 0 60px}
.legal-card{background:rgba(255,255,255,.72);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,.9);border-radius:24px;padding:48px 40px;max-width:800px;margin:0 auto;box-shadow:0 8px 32px rgba(91,63,191,.1)}
.legal-card h1{font-family:'Playfair Display',serif;font-weight:500;font-size:clamp(32px,5vw,48px);line-height:1.1;color:var(--ink);margin-bottom:12px}
.legal-subtitle{font-size:14px;color:var(--ink-mute);margin-bottom:36px}
.legal-section{padding-top:24px;margin-top:24px;border-top:1px solid rgba(91,63,191,.12)}
.legal-section h3{font-family:'Playfair Display',serif;font-weight:500;font-size:18px;color:var(--ink);margin-bottom:10px}
.legal-section p{font-size:16px;color:var(--ink-soft);line-height:1.75}
.legal-back{display:inline-flex;align-items:center;gap:8px;margin-top:36px;font-size:14px;font-weight:600;color:var(--violet-deep);text-decoration:none}
.legal-back:hover{gap:12px}
footer{padding:60px 0 40px;border-top:1px solid rgba(91,63,191,.15);margin-top:40px}
.footer-grid{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:24px}
.footer-logo{display:flex;align-items:center;gap:10px}
.footer-logo img{width:32px;height:32px}
.footer-logo-text{font-family:'Playfair Display',serif;font-weight:500;font-size:18px;color:var(--ink)}
.footer-links{display:flex;gap:28px;list-style:none;flex-wrap:wrap}
.footer-links a{font-size:14px;color:var(--ink-soft);text-decoration:none;transition:color .3s}
.footer-links a:hover{color:var(--violet-deep)}
.footer-links a.active{color:var(--violet-deep);font-weight:600}
.footer-copy{font-size:13px;color:var(--ink-mute)}
@media(max-width:640px){.legal-card{padding:32px 24px}.footer-grid{flex-direction:column;align-items:flex-start}}
</style>
</head>
<body>
<div class="orb orb-1"></div>
<div class="orb orb-2"></div>
<div class="orb orb-3"></div>

<nav>
  <a href="index.html" class="nav-logo">
    <img src="logo.png" alt="Kors Motion">
    <span class="nav-logo-text">Kors Motion</span>
  </a>
  <button class="nav-hamburger" id="navHamburger" type="button" aria-label="Menu" aria-expanded="false">
    <span></span><span></span><span></span>
  </button>
  <div class="nav-backdrop" id="navBackdrop"></div>
  <div class="nav-links-wrap" id="navMenu">
    <ul>
      <li><a href="index.html#services" class="nav-link" data-i18n="nav.services">Services</a></li>
      <li><a href="index.html#portfolio" class="nav-link" data-i18n="nav.portfolio">Portfolio</a></li>
      <li><a href="index.html#reviews" class="nav-link" data-i18n="nav.reviews">Referenzen</a></li>
    </ul>
    <a href="index.html" class="nav-cta nav-cta-mobile" data-i18n="nav.cta">Kontakt</a>
  </div>
  <div class="lang-switcher" id="langSwitcher">
    <button class="lang-button" id="langButton" type="button">
      <span class="lang-flag flag-de" id="currentFlag"></span>
      <span id="currentLang">DE</span>
      <svg width="10" height="10" viewBox="0 0 12 12" fill="none"><path d="M3 4.5L6 7.5L9 4.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
    </button>
    <div class="lang-dropdown" id="langDropdown">
      <button class="lang-option" type="button" data-lang="ru"><span class="lang-flag flag-ru"></span> Русский</button>
      <button class="lang-option" type="button" data-lang="de"><span class="lang-flag flag-de"></span> Deutsch</button>
      <button class="lang-option" type="button" data-lang="en"><span class="lang-flag flag-en"></span> English</button>
      <button class="lang-option" type="button" data-lang="it"><span class="lang-flag flag-it"></span> Italiano</button>
      <button class="lang-option" type="button" data-lang="fr"><span class="lang-flag flag-fr"></span> Français</button>
      <button class="lang-option" type="button" data-lang="es"><span class="lang-flag flag-es"></span> Español</button>
    </div>
  </div>
  <a href="index.html" class="nav-cta" data-i18n="nav.cta">Kontakt</a>
</nav>

<main class="legal-page">
  <div class="container">
    <div class="legal-card" id="agbContent"></div>
  </div>
</main>

<footer>
  <div class="container">
    <div class="footer-grid">
      <div class="footer-logo"><img src="logo.png" alt="Kors Motion"><span class="footer-logo-text">Kors Motion</span></div>
      <ul class="footer-links">
        <li><a href="index.html#services" data-i18n="nav.services">Services</a></li>
        <li><a href="index.html#portfolio" data-i18n="nav.portfolio">Portfolio</a></li>
        <li><a href="index.html#reviews" data-i18n="nav.reviews">Referenzen</a></li>
        <li><a href="index.html" data-i18n="footer.contact">Kontakt</a></li>
        <li><a href="impressum.html" data-i18n="footer.impressum">Impressum</a></li>
        <li><a href="agb.html" class="active" data-i18n="footer.agb">AGB</a></li>
      </ul>
      <div class="footer-copy">© 2026 Kors Motion · Switzerland</div>
    </div>
  </div>
</footer>

<script src="agb-content.js"></script>
<script>
const LANG_KEY = 'lang';
const codes = { ru:'RU', de:'DE', en:'EN', it:'IT', fr:'FR', es:'ES' };

const uiTranslations = {
  ru: {
    'nav.services':'Услуги','nav.portfolio':'Работы','nav.reviews':'Отзывы','nav.cta':'Связаться',
    'footer.contact':'Контакты','footer.impressum':'Импрессум','footer.agb':'AGB',
    'agb.back':'← На главную'
  },
  de: {
    'nav.services':'Services','nav.portfolio':'Portfolio','nav.reviews':'Referenzen','nav.cta':'Kontakt',
    'footer.contact':'Kontakt','footer.impressum':'Impressum','footer.agb':'AGB',
    'agb.back':'← Zur Startseite'
  },
  en: {
    'nav.services':'Services','nav.portfolio':'Work','nav.reviews':'Testimonials','nav.cta':'Contact',
    'footer.contact':'Contact','footer.impressum':'Imprint','footer.agb':'Terms & Conditions',
    'agb.back':'← Back to home'
  },
  fr: {
    'nav.services':'Services','nav.portfolio':'Portfolio','nav.reviews':'Témoignages','nav.cta':'Contact',
    'footer.contact':'Contact','footer.impressum':'Mentions légales','footer.agb':'CGV',
    'agb.back':'← Retour à l\'accueil'
  },
  it: {
    'nav.services':'Servizi','nav.portfolio':'Portfolio','nav.reviews':'Dicono di me','nav.cta':'Contatti',
    'footer.contact':'Contatti','footer.impressum':'Impronta','footer.agb':'CGC',
    'agb.back':'← Torna alla home'
  },
  es: {
    'nav.services':'Servicios','nav.portfolio':'Portfolio','nav.reviews':'Testimonios','nav.cta':'Contacto',
    'footer.contact':'Contacto','footer.impressum':'Aviso legal','footer.agb':'Términos y condiciones',
    'agb.back':'← Volver al inicio'
  }
};

function detectLang() {
  const saved = localStorage.getItem(LANG_KEY);
  if (saved && AGB_CONTENT[saved]) return saved;
  return 'de';
}

function renderAgb(lang) {
  const data = AGB_CONTENT[lang] || AGB_CONTENT.de;
  const ui = uiTranslations[lang] || uiTranslations.de;
  const container = document.getElementById('agbContent');
  let html = '<h1>' + data.title + '</h1>';
  html += '<p class="legal-subtitle">' + data.subtitle + '</p>';
  data.sections.forEach(s => {
    html += '<div class="legal-section"><h3>' + s.title + '</h3><p>' + s.text + '</p></div>';
  });
  html += '<a href="index.html" class="legal-back">' + ui['agb.back'] + '</a>';
  container.innerHTML = html;
  document.title = data.title + ' — Kors Motion';
  document.documentElement.lang = lang;
}

function applyLang(lang) {
  const ui = uiTranslations[lang] || uiTranslations.de;
  document.querySelectorAll('[data-i18n]').forEach(el => {
    const key = el.getAttribute('data-i18n');
    if (ui[key]) el.textContent = ui[key];
  });
  document.getElementById('currentLang').textContent = codes[lang] || 'DE';
  document.getElementById('currentFlag').className = 'lang-flag flag-' + lang;
  document.querySelectorAll('.lang-option').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.lang === lang);
  });
  localStorage.setItem(LANG_KEY, lang);
  localStorage.setItem('korsmotion_lang', lang);
  renderAgb(lang);
}

const switcher = document.getElementById('langSwitcher');
document.getElementById('langButton').addEventListener('click', e => {
  e.stopPropagation();
  switcher.classList.toggle('open');
});
document.addEventListener('click', () => switcher.classList.remove('open'));
document.querySelectorAll('.lang-option').forEach(btn => {
  btn.addEventListener('click', e => {
    e.stopPropagation();
    applyLang(btn.dataset.lang);
    switcher.classList.remove('open');
  });
});
applyLang(detectLang());

function setNavMenu(open) {
  const nav = document.querySelector('nav');
  const btn = document.getElementById('navHamburger');
  const backdrop = document.getElementById('navBackdrop');
  nav.classList.toggle('menu-open', open);
  if (btn) {
    btn.classList.toggle('open', open);
    btn.setAttribute('aria-expanded', open ? 'true' : 'false');
  }
  if (backdrop) backdrop.classList.toggle('open', open);
  document.body.classList.toggle('modal-open', open);
}
document.getElementById('navHamburger').addEventListener('click', () => {
  setNavMenu(!document.querySelector('nav').classList.contains('menu-open'));
});
document.getElementById('navBackdrop').addEventListener('click', () => setNavMenu(false));
document.querySelectorAll('.nav-links-wrap .nav-link, .nav-cta-mobile').forEach(link => {
  link.addEventListener('click', () => setNavMenu(false));
});
</script>
</body>
</html>
